<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #000000, #0a0a0a);
  overflow: hidden;
  font-family: Arial;
}

canvas {
  position: absolute;
  top: 0;
  filter: brightness(1.3) contrast(1.2);
}

/* TEXT */
.text-container {
  position: absolute;
  top: 40%;
  width: 100%;
  text-align: center;
}

.text {
  display: inline-block;
  font-size: 52px;
  color: #fff;
  overflow: hidden;
  white-space: nowrap;
  width: 0;
  text-shadow: 0 0 25px rgba(255,182,193,0.9);
}

@keyframes reveal {
  from { width: 0; }
  to { width: 100%; }
}
</style>
</head>

<body>

<audio id="heartbeat" src="heartbeat.mp3"></audio>
<audio id="bgm" src="music.mp3" loop></audio>

<canvas id="canvas"></canvas>

<div class="text-container">
  <div class="text" id="text">Happy Birthday Disha 💖</div>
</div>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let rockets = [];
let particles = [];
let sparkles = [];
let slowMotion = 1;

// 🎵 HEARTBEAT + MUSIC
let bgm = document.getElementById("bgm");
let heartbeat = document.getElementById("heartbeat");

window.addEventListener("click", () => {

  // play heartbeat first
  heartbeat.volume = 1;
  heartbeat.play();

  // after 4 seconds start main music
  setTimeout(() => {
    bgm.volume = 0;
    bgm.play();

    let fade = setInterval(() => {
      if (bgm.volume < 0.5) bgm.volume += 0.01;
      else clearInterval(fade);
    }, 100);
  }, 4000);

}, { once: true });

// 🌈 Cute colors
function getCuteColor() {
  let colors = ["#ff69b4","#ffb6c1","#ffc0cb","#ffd1dc","#ff85a2"];
  return colors[Math.floor(Math.random()*colors.length)];
}


// 🚀 Rocket
class Rocket {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = canvas.height;
    this.targetY = Math.random() * canvas.height * 0.5 + 50;
    this.speed = Math.random() * 4 + 6;
    this.color = getCuteColor();
    this.exploded = false;
  }

  update() {
    this.y -= this.speed * slowMotion;

    if (this.y <= this.targetY && !this.exploded) {
      this.exploded = true;
      this.explode();
    }
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
  }

  explode() {
    for (let i = 0; i < 120; i++) {
      let angle = Math.random() * Math.PI * 2;
      particles.push(new Particle(this.x, this.y, angle, this.color));
    }
  }
}


// ✨ Particle
class Particle {
  constructor(x, y, angle, color) {
    this.x = x;
    this.y = y;
    this.speed = Math.random() * 4 + 2;
    this.angle = angle;
    this.friction = 0.97;
    this.gravity = 0.06;
    this.life = 100;
    this.color = color;
    this.alpha = 1;
  }

  update() {
    this.speed *= this.friction;

    this.x += Math.cos(this.angle) * this.speed * slowMotion;
    this.y += Math.sin(this.angle) * this.speed * slowMotion;

    this.y += this.gravity * slowMotion;

    this.life--;
    this.alpha = this.life / 100;
  }

  draw() {
    ctx.globalAlpha = this.alpha;
    ctx.beginPath();
    ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}


// 🌟 SPARKLES (cute floating stars)
class Sparkle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 1;
    this.alpha = Math.random();
    this.fade = Math.random() * 0.02;
  }

  update() {
    this.alpha += this.fade;
    if (this.alpha <= 0 || this.alpha >= 1) this.fade *= -1;
  }

  draw() {
    ctx.globalAlpha = this.alpha;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// create sparkles
for (let i = 0; i < 120; i++) {
  sparkles.push(new Sparkle());
}


// 💖 HEART EXPLOSION
function heartExplosion(x, y) {
  for (let i = 0; i < 150; i++) {
    let t = i / 150 * Math.PI * 2;

    let hx = 16 * Math.pow(Math.sin(t), 3);
    let hy = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));

    particles.push(new Particle(
      x,
      y,
      Math.atan2(hy, hx),
      "#ff69b4"
    ));
  }
}


// 🎬 Animation
function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.15)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  sparkles.forEach(s => {
    s.update();
    s.draw();
  });

  rockets.forEach((r, i) => {
    r.update();
    r.draw();
    if (r.exploded) rockets.splice(i, 1);
  });

  particles.forEach((p, i) => {
    p.update();
    p.draw();
    if (p.life <= 0) particles.splice(i, 1);
  });

  requestAnimationFrame(animate);
}


// 🎆 FESTIVAL MODE++
setInterval(() => {
  for (let i = 0; i < 5; i++) {
    rockets.push(new Rocket());
  }
}, 300);

animate();


// 💖 MOMENT
setTimeout(() => {
  let text = document.getElementById("text");
  text.style.animation = "reveal 3s linear forwards";

  slowMotion = 0.25;

  heartExplosion(canvas.width / 2, canvas.height / 2);

}, 5000);


// 👉 NEXT PAGE
setTimeout(() => {
  alert("Click again Dish 💖");
  window.location.href = "page3.html";
}, 9000);

</script>

</body>
</html>
